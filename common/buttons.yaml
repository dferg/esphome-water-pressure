binary_sensor:
  - platform: gpio
    id: button_1
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
    name: "Button 1"
    on_press:
      then:
        - display.page.show_next: main_display
        - component.update: main_display

  - platform: gpio
    id: button_2
    pin:
      number: GPIO14
      inverted: true
    name: "Button 2"
    on_press:
      then:
        - lambda: |-
            auto current = id(main_display).get_active_page();
            if (current == id(page_detail)) {
              // Cycle detail sensor 0 -> 1 -> 2 -> 3 -> 0
              id(detail_sensor) = (id(detail_sensor) + 1) % 4;
            } else if (current == id(page_minmax)) {
              // Reset min/max
              for (int i = 0; i < 4; i++) {
                id(min_psi)[i] = 999.0f;
                id(max_psi)[i] = -1.0f;
              }
            }
        - component.update: main_display
