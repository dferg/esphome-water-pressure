# Example consumer configuration for Home Assistant / ESPHome dashboard.
#
# Copy this file to your ESPHome config directory and customize the
# substitutions below.  Only wifi credentials (via !secret) and the
# package URL are required; everything else has sensible defaults.

substitutions:
  name: "my-water-pressure"
  friendly_name: "Home Water Pressure"

  # Predictable mDNS: use false so the device is my-water-pressure.local
  # (not my-water-pressure-XXXXXX.local).  Use only if you have one device.
  # name_add_mac_suffix: "false"

  # Give each sensor a meaningful label for your installation
  pressure_1_name: "Main Supply"
  pressure_2_name: "Zone 1"
  pressure_3_name: "Zone 2"
  pressure_4_name: "Zone 3"

  # Override if your transducers have a different PSI rating
  # max_psi: "150"

  # Display color thresholds (PSI)
  # psi_warn: "80"
  # psi_crit: "120"

  # Override I2C pins if your board uses different wiring
  # i2c_sda: "GPIO43"
  # i2c_scl: "GPIO44"

  # ADS1115 address (0x49 if ADDR pin tied to VCC)
  # ads1115_address: "0x49"

  # Home Assistant reporting interval (published entities)
  update_interval: "2s"
  # Fast internal ADC sampling for responsive display/min-max tracking
  # adc_sample_interval: "250ms"

  # --- Calibration (optional; defaults: mult 1.0, offset 0.0)
  # Formula: PSI_final = PSI_raw * cal_mult + cal_offset
  # Step 1 at 0 PSI (atmosphere): cal_offset = -(error you see in HA)
  #   pressure_1_cal_offset: "-2.3"
  # Step 2 span (after zero is good): cal_mult ≈ reference / HA_reading
  #   pressure_1_cal_mult: "1.053"
  # pressure_2_cal_offset: "0.0"
  # pressure_2_cal_mult: "1.0"
  # pressure_3_cal_offset: "0.0"
  # pressure_3_cal_mult: "1.0"
  # pressure_4_cal_offset: "0.0"
  # pressure_4_cal_mult: "1.0"

packages:
  water_pressure:
    url: https://github.com/dferg/esphome-water-pressure
    files: [water-pressure-esp32.yaml]
    ref: main
    refresh: 1d

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key