substitutions:
  name: "water-pressure"
  friendly_name: "Water Pressure Monitor"

  # When true (default), hostname is <name>-<mac>.local (e.g. my-water-pressure-a1b2c3.local).
  # Set to false in your consumer YAML for a fixed <name>.local (only one device per name).
  name_add_mac_suffix: "true"

  # Home Assistant report interval (published sensors)
  update_interval: "2s"
  # Fast ADC sampling interval (used for display/internal calculations)
  adc_sample_interval: "250ms"
  # Serial/log print interval (independent from ADC sampling)
  log_interval: "5s"

  # Pressure transducer max rating (PSI)
  max_psi: "200"

  # Per-sensor calibration (applied as: PSI_final = PSI_raw * mult + offset)
  pressure_1_cal_mult: "1.0"
  pressure_1_cal_offset: "0.0"
  pressure_2_cal_mult: "1.0"
  pressure_2_cal_offset: "0.0"
  pressure_3_cal_mult: "1.0"
  pressure_3_cal_offset: "0.0"
  pressure_4_cal_mult: "1.0"
  pressure_4_cal_offset: "0.0"

  # PSI color thresholds for display
  psi_warn: "80"
  psi_crit: "120"

  # Sensor friendly names
  pressure_1_name: "Pressure 1"
  pressure_2_name: "Pressure 2"
  pressure_3_name: "Pressure 3"
  pressure_4_name: "Pressure 4"

  # I2C pins (Qwiic/Stemma connector on T-Display-S3)
  i2c_sda: "GPIO43"
  i2c_scl: "GPIO44"

  # ADS1115 I2C address (0x48 = ADDR to GND, 0x49 = ADDR to VCC)
  ads1115_address: "0x48"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: ${name_add_mac_suffix}
  project:
    name: water-pressure.monitor
    version: "3.0.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  speed: 80MHz
  mode: octal

i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  id: bus_ads1115

ads1115:
  - id: ads1115_hub
    address: ${ads1115_address}

logger:
  level: INFO

api:

ota:
  platform: esphome

web_server:
  port: 80
  log: false

wifi:
  ap:
    password: "12345678"

captive_portal:

esp32_improv:
  authorizer: none

improv_serial:

dashboard_import:
  package_import_url: github://dferg/esphome-water-pressure/water-pressure-esp32.yaml@main
  import_full_config: false

packages:
  pressure_sensor_1: !include
    file: common/pressure-sensor.yaml
    vars:
      sensor_id: pressure_1
      sensor_name: "${pressure_1_name}"
      sensor_channel: "A0_GND"
      sensor_sample_interval: "${adc_sample_interval}"
      sensor_report_interval: "${update_interval}"
      sensor_max_psi: "${max_psi}"
      sensor_cal_mult: "${pressure_1_cal_mult}"
      sensor_cal_offset: "${pressure_1_cal_offset}"
  pressure_sensor_2: !include
    file: common/pressure-sensor.yaml
    vars:
      sensor_id: pressure_2
      sensor_name: "${pressure_2_name}"
      sensor_channel: "A1_GND"
      sensor_sample_interval: "${adc_sample_interval}"
      sensor_report_interval: "${update_interval}"
      sensor_max_psi: "${max_psi}"
      sensor_cal_mult: "${pressure_2_cal_mult}"
      sensor_cal_offset: "${pressure_2_cal_offset}"
  pressure_sensor_3: !include
    file: common/pressure-sensor.yaml
    vars:
      sensor_id: pressure_3
      sensor_name: "${pressure_3_name}"
      sensor_channel: "A2_GND"
      sensor_sample_interval: "${adc_sample_interval}"
      sensor_report_interval: "${update_interval}"
      sensor_max_psi: "${max_psi}"
      sensor_cal_mult: "${pressure_3_cal_mult}"
      sensor_cal_offset: "${pressure_3_cal_offset}"
  pressure_sensor_4: !include
    file: common/pressure-sensor.yaml
    vars:
      sensor_id: pressure_4
      sensor_name: "${pressure_4_name}"
      sensor_channel: "A3_GND"
      sensor_sample_interval: "${adc_sample_interval}"
      sensor_report_interval: "${update_interval}"
      sensor_max_psi: "${max_psi}"
      sensor_cal_mult: "${pressure_4_cal_mult}"
      sensor_cal_offset: "${pressure_4_cal_offset}"
  display_config: !include common/display.yaml
  buttons_config: !include common/buttons.yaml

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic

  - platform: template
    id: adc_last_success_age
    name: "ADC Last Successful I2C Age"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-outline"
    state_class: measurement
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(adc_ever_seen)) {
        return NAN;
      }
      return (millis() - id(adc_last_ok_ms)) / 1000.0f;

interval:
  - interval: ${log_interval}
    then:
      - lambda: |-
          ESP_LOGI(
            "pressure",
            "P1=%.1f P2=%.1f P3=%.1f P4=%.1f PSI | ADC=%s",
            id(pressure_1).state,
            id(pressure_2).state,
            id(pressure_3).state,
            id(pressure_4).state,
            id(adc_i2c_communication_ok).state ? "OK" : "NO_COMM"
          );

button:
  - platform: restart
    name: "Restart"
    entity_category: config

binary_sensor:
  - platform: template
    id: adc_i2c_communication_ok
    name: "ADC I2C Communication"
    device_class: connectivity
    entity_category: diagnostic
    lambda: |-
      return id(adc_valid_count) > 0;
